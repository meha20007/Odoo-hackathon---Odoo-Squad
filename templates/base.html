<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Dashboard{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search vehicles, drivers, trips...">
    </div>

    <div class="topbar-right">
      <div class="bell-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-dot"></span>

        <div class="notif-panel">
          <h4>Notifications</h4>
          <p>You're all caught up. New alerts will show up here.</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="user-menu">
        <div class="avatar">AO</div>
        <div class="user-info">
          <div class="user-name">Amara Okoye</div>
          <div class="user-role">Fleet Manager</div>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>

        <div class="dropdown-menu">
          <button>My Profile</button>
          <button>Settings</button>
          <button>Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Page content — each page that extends base.html fills this in -->
  <div class="page">
    {% block content %}{% endblock %}
  </div>

  <div class="toast"></div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
