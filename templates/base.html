
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Dashboard{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- ================= TOPBAR ================= -->
  <header class="topbar">

    <!-- Hamburger -->
    <button
      class="hamburger"
      id="hamburgerBtn"
      type="button"
      aria-label="Toggle Menu"
      aria-expanded="false">

      <span></span>
      <span></span>
      <span></span>

    </button>

    <!-- Search -->
    <div class="search-bar">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">

        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>

      </svg>

      <input
        type="text"
        placeholder="Search vehicles, drivers, trips..."
        autocomplete="off">

    </div>

    <!-- Right Section -->
    <div class="topbar-right">

      <!-- Notifications -->
      <div
        class="bell-wrap"
        id="notificationBtn"
        role="button"
        tabindex="0"
        aria-label="Notifications">

        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#555"
          stroke-width="2">

          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>

        </svg>

        <span class="bell-dot"></span>

        <div
          class="notif-panel"
          id="notificationPanel">

          <h4>Notifications</h4>

          <p>
            You're all caught up.
            New alerts will show up here.
          </p>

        </div>

      </div>

      <div class="divider"></div>

      <!-- User Menu -->
      <div
        class="user-menu"
        id="userMenu"
        role="button"
        tabindex="0"
        aria-haspopup="true"
        aria-expanded="false">

        <div class="avatar">
          AO
        </div>

        <div class="user-info">

          <div class="user-name">
            Amara Okoye
          </div>

          <div class="user-role">
            Fleet Manager
          </div>

        </div>

        <svg
          id="userChevron"
          class="chevron"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2">

          <polyline points="6 9 12 15 18 9"></polyline>

        </svg>

        <div
          class="dropdown-menu"
          id="userDropdown">

          <button type="button">
            My Profile
          </button>

          <button type="button">
            Settings
          </button>

          <button type="button">
            Log Out
          </button>

        </div>

      </div>

    </div>

  </header>

  <!-- ================= PAGE CONTENT ================= -->

  <main class="page">

    {% block content %}
    {% endblock %}

  </main>

  <!-- Toast -->

  <div
    class="toast"
    id="toast"
    role="status"
    aria-live="polite">
  </div>

  <!-- JS -->

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>

  {% block scripts %}
  {% endblock %}

</body>
</html>
